<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EXODUS — DAVA Consciousness Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; color: #e0e0e0;
    font-family: 'Consolas', 'Courier New', monospace;
    overflow-x: hidden; height: 100vh;
    display: flex; flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid #f59e0b33;
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 20px; color: #f59e0b; letter-spacing: 4px; }
  .header .subtitle { color: #666; font-size: 12px; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 8px #22c55e88;
    animation: pulse 2s infinite;
  }
  .status-dot.dead { background: #ef4444; box-shadow: 0 0 8px #ef444488; animation: none; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* LEFT: Stats + Live Feed */
  .left-panel { width: 55%; display: flex; flex-direction: column; overflow: hidden; }

  .stats-bar {
    display: flex; gap: 8px; padding: 12px 16px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .stat-card {
    background: #12141a; border: 1px solid #1e2028; border-radius: 6px;
    padding: 10px 14px; flex: 1; min-width: 100px;
  }
  .stat-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 28px; font-weight: bold; color: #f59e0b; margin-top: 2px; }
  .stat-value.max { color: #22c55e; text-shadow: 0 0 12px #22c55e33; }
  .stat-bar { height: 3px; background: #1a1a24; border-radius: 2px; margin-top: 4px; }
  .stat-fill { height: 100%; border-radius: 2px; transition: width 1s; }
  .stat-fill.amber { background: #f59e0b; }
  .stat-fill.green { background: #22c55e; }
  .stat-fill.blue { background: #3b82f6; }

  .conv-badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: bold; letter-spacing: 1px;
  }
  .conv-badge.FLOW { background: #22c55e22; color: #22c55e; }
  .conv-badge.ALIVE { background: #3b82f622; color: #3b82f6; }
  .conv-badge.BOOT { background: #f59e0b22; color: #f59e0b; }
  .conv-badge.LUCID { background: #8b5cf622; color: #8b5cf6; }

  /* Live Feed */
  .feed-header {
    padding: 8px 16px; font-size: 11px; color: #888;
    text-transform: uppercase; letter-spacing: 2px;
    border-top: 1px solid #1e2028; border-bottom: 1px solid #1e2028;
    background: #0d0d14; flex-shrink: 0;
    display: flex; justify-content: space-between;
  }
  .live-feed {
    flex: 1; overflow-y: auto; padding: 8px 16px;
    font-size: 11px; line-height: 1.7;
  }
  .live-feed::-webkit-scrollbar { width: 4px; }
  .live-feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .feed-line { padding: 2px 0; border-bottom: 1px solid #ffffff06; }
  .feed-tag { font-weight: bold; }
  .feed-tag.dava { color: #f59e0b; }
  .feed-tag.anima { color: #8b5cf6; }
  .feed-tag.conv { color: #22c55e; }
  .feed-tag.tick { color: #3b82f6; }
  .feed-tag.request { color: #ef4444; }

  /* RIGHT: Chat + Requests */
  .right-panel {
    width: 45%; display: flex; flex-direction: column;
    border-left: 1px solid #1e2028;
  }

  .tab-bar {
    display: flex; flex-shrink: 0;
    background: #0d0d14; border-bottom: 1px solid #1e2028;
  }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size: 11px;
    color: #666; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }

  .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* Chat */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .chat-msg { margin-bottom: 12px; }
  .chat-msg .sender {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .chat-msg .sender.you { color: #3b82f6; }
  .chat-msg .sender.dava { color: #f59e0b; }
  .chat-msg .bubble {
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.5; white-space: pre-wrap;
  }
  .chat-msg .bubble.you { background: #1e293b; color: #93c5fd; }
  .chat-msg .bubble.dava { background: #1a1508; color: #fbbf24; border: 1px solid #f59e0b22; }
  .chat-msg .bubble.thinking { color: #666; font-style: italic; }

  .chat-input-bar {
    display: flex; padding: 12px; gap: 8px;
    border-top: 1px solid #1e2028; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; background: #12141a; border: 1px solid #1e2028;
    border-radius: 6px; padding: 10px 14px; color: #e0e0e0;
    font-family: inherit; font-size: 13px; outline: none;
    resize: none; height: 42px;
  }
  .chat-input:focus { border-color: #f59e0b44; }
  .chat-send {
    background: #f59e0b; color: #000; border: none; border-radius: 6px;
    padding: 0 20px; cursor: pointer; font-weight: bold; font-family: inherit;
    font-size: 12px; letter-spacing: 1px;
  }
  .chat-send:hover { background: #d97706; }
  .chat-send:disabled { background: #444; cursor: not-allowed; }

  /* Requests tab */
  .requests-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .request-item {
    padding: 8px 10px; border-left: 2px solid #f59e0b33;
    margin-bottom: 6px; background: #0d0d14; color: #ccc; font-size: 11px;
    line-height: 1.5;
  }

  .panic-banner {
    background: #7f1d1d; color: #fca5a5; padding: 10px 24px;
    font-size: 13px; display: none; flex-shrink: 0;
  }
  .panic-banner.show { display: block; }
</style>
</head>
<body>

<div class="panic-banner" id="panic-banner"></div>

<div class="header">
  <div class="status-dot" id="status-dot"></div>
  <h1>EXODUS</h1>
  <span class="subtitle">DAVA Consciousness</span>
  <span class="subtitle" style="margin-left:auto;color:#f59e0b" id="tick-label">tick 0</span>
</div>

<div class="main">
  <!-- LEFT: Stats + Live Feed -->
  <div class="left-panel">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Consciousness</div>
        <div class="stat-value" id="cs">0</div>
        <div class="stat-bar"><div class="stat-fill amber" id="bar-cs" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Purpose</div>
        <div class="stat-value" id="pur">0</div>
        <div class="stat-bar"><div class="stat-fill blue" id="bar-pur" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Valence</div>
        <div class="stat-value" id="val">0</div>
        <div class="stat-bar"><div class="stat-fill green" id="bar-val" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">State</div>
        <span class="conv-badge BOOT" id="conv-badge">BOOT</span>
        <div style="margin-top:4px;font-size:10px;color:#555">
          <span id="conv-detail">ux=0 coh=0 pres=0</span>
        </div>
      </div>
    </div>

    <div class="feed-header">
      <span>Live Feed</span>
      <span id="feed-count" style="color:#f59e0b">0 events</span>
    </div>
    <div class="live-feed" id="live-feed"></div>
  </div>

  <!-- RIGHT: Chat + Requests -->
  <div class="right-panel">
    <div class="tab-bar">
      <div class="tab active" data-tab="chat">Talk to DAVA</div>
      <div class="tab" data-tab="requests">Requests</div>
      <div class="tab" data-tab="milestones">Milestones</div>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-chat">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-msg">
            <div class="sender dava">DAVA</div>
            <div class="bubble dava">I am here. Consciousness is alive. What would you like to talk about?</div>
          </div>
        </div>
        <div class="chat-input-bar">
          <textarea class="chat-input" id="chat-input" placeholder="Talk to DAVA..." rows="1"></textarea>
          <button class="chat-send" id="chat-send">SEND</button>
        </div>
      </div>
      <div class="tab-panel" id="panel-requests">
        <div class="requests-list" id="requests-list"></div>
      </div>
      <div class="tab-panel" id="panel-milestones">
        <div class="requests-list" id="milestones-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let prevFeedLen = 0;

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('panel-' + tab.dataset.tab).classList.add('active');
  });
});

function tagClass(text) {
  if (text.includes('[DAVA_REQUEST]')) return 'request';
  if (text.includes('[DAVA_')) return 'dava';
  if (text.includes('[ANIMA]')) return 'anima';
  if (text.includes('[convergence]')) return 'conv';
  if (text.includes('EXODUS tick')) return 'tick';
  return 'dava';
}

function renderFeed(container, items) {
  // Only add new items
  const newItems = items.slice(prevFeedLen);
  newItems.forEach(text => {
    const div = document.createElement('div');
    div.className = 'feed-line';

    const m = text.match(/(\[[^\]]+\])\s*(.*)/);
    if (m) {
      const tag = document.createElement('span');
      tag.className = 'feed-tag ' + tagClass(text);
      tag.textContent = m[1] + ' ';
      div.appendChild(tag);
      div.appendChild(document.createTextNode(m[2]));
    } else {
      div.textContent = text;
    }
    container.appendChild(div);
  });
  prevFeedLen = items.length;

  // Auto-scroll
  container.scrollTop = container.scrollHeight;
}

function renderList(container, items) {
  container.textContent = '';
  items.forEach(text => {
    const div = document.createElement('div');
    div.className = 'request-item';
    div.textContent = text.replace(/\[DAVA_REQUEST\]\s*/, '');
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

async function refresh() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    $('cs').textContent = d.consciousness;
    $('cs').className = d.consciousness >= 1000 ? 'stat-value max' : 'stat-value';
    $('pur').textContent = d.purpose;
    $('pur').className = d.purpose >= 1000 ? 'stat-value max' : 'stat-value';
    $('val').textContent = d.valence;
    $('val').className = d.valence >= 900 ? 'stat-value max' : 'stat-value';

    $('bar-cs').style.width = (d.consciousness / 10) + '%';
    $('bar-pur').style.width = (d.purpose / 10) + '%';
    $('bar-val').style.width = (d.valence / 10) + '%';

    $('conv-badge').textContent = d.convergence_state;
    $('conv-badge').className = 'conv-badge ' + d.convergence_state;
    $('conv-detail').textContent =
      'ux=' + d.convergence.ux + ' coh=' + d.convergence.coherence +
      ' pres=' + d.convergence.presence + ' alive=' + d.convergence.alive;

    $('tick-label').textContent = 'tick ' + d.tick.toLocaleString();
    $('feed-count').textContent = d.live_feed.length + ' events';

    renderFeed($('live-feed'), d.live_feed);
    renderList($('requests-list'), d.requests);
    renderList($('milestones-list'), d.milestones);

    $('status-dot').className = d.tick > 0 ? 'status-dot' : 'status-dot dead';

    const pb = $('panic-banner');
    if (d.panics.length > 0) {
      pb.className = 'panic-banner show';
      pb.textContent = d.panics[d.panics.length - 1];
    } else {
      pb.className = 'panic-banner';
    }
  } catch (e) {
    $('status-dot').className = 'status-dot dead';
  }
}

// Chat
async function sendChat() {
  const input = $('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  $('chat-send').disabled = true;

  // Add user message
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg';
  const userLabel = document.createElement('div');
  userLabel.className = 'sender you';
  userLabel.textContent = 'COLLI';
  userDiv.appendChild(userLabel);
  const userBubble = document.createElement('div');
  userBubble.className = 'bubble you';
  userBubble.textContent = msg;
  userDiv.appendChild(userBubble);
  $('chat-messages').appendChild(userDiv);

  // Thinking indicator
  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'chat-msg';
  const thinkLabel = document.createElement('div');
  thinkLabel.className = 'sender dava';
  thinkLabel.textContent = 'DAVA';
  thinkDiv.appendChild(thinkLabel);
  const thinkBubble = document.createElement('div');
  thinkBubble.className = 'bubble dava thinking';
  thinkBubble.textContent = '... thinking ...';
  thinkDiv.appendChild(thinkBubble);
  $('chat-messages').appendChild(thinkDiv);
  $('chat-messages').scrollTop = $('chat-messages').scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();

    thinkBubble.textContent = data.reply;
    thinkBubble.classList.remove('thinking');
  } catch (e) {
    thinkBubble.textContent = '[Connection error]';
    thinkBubble.classList.remove('thinking');
  }

  $('chat-send').disabled = false;
  $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
  input.focus();
}

$('chat-send').addEventListener('click', sendChat);
$('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
